<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>AI Studio</title>
    <style>
        html.studio-route-booting body {
            visibility: hidden !important;
        }
    </style>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
                document.documentElement.classList.add('studio-route-booting');
                setTimeout(function(){
                    document.documentElement.classList.remove('studio-route-booting');
                }, 1500);
            } catch(e) {}
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/theme.js?v=20260516-theme-sync"></script>
    <script src="/static/i18n.js?v=20260514-provider-protocol"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        /* 鏈湴 Tailwind 宸ュ叿绫诲厹搴曪細CDN 鎱?鏈氨缁椂涔熻兘绔嬪埢缁欏浘鏍囧昂瀵革紝閬垮厤棣栧睆宸︿晶鏍忕┖鐧?*/
        .w-1\.5 { width: 0.375rem; }
        .h-1\.5 { height: 0.375rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .flex-shrink-0 { flex-shrink: 0; }
        .rounded-full { border-radius: 9999px; }
        .mb-12 { margin-bottom: 3rem; }
        .transition-colors { transition-property: color, background-color, border-color, fill, stroke; transition-duration: 150ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse { animation: studio-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes studio-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        :root {
            --accent: #000000;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #ffffff;
            --sidebar-bg: #ffffff;
            --stage-bg: #fcfcfc;
            --border: #f2f2f2;
            --stage-border: #f0f0f0;
            --text: #121212;
            --muted: #999;
            --nav-hover-bg: #fafafa;
            --monitor-bg: rgba(255, 255, 255, 0.7);
            --monitor-border: rgba(0, 0, 0, 0.05);
            --monitor-shadow: rgba(0, 0, 0, 0.04);
            --divider: rgba(0, 0, 0, 0.1);
            --scrollbar: #d8d8d8;
            --scrollbar-hover: #c0c0c0;
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #0f141d;
            --sidebar-bg: #0f141d;
            --stage-bg: #111722;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --monitor-bg: rgba(23, 29, 41, 0.82);
            --monitor-border: rgba(255, 255, 255, 0.08);
            --monitor-shadow: rgba(0, 0, 0, 0.3);
            --divider: rgba(255, 255, 255, 0.15);
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
        }

        /* 鏋佺畝婊氬姩鏉?*/
        html,
        body {
            overscroll-behavior: auto;
        }

        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 3px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
            min-height: 36px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 渚ц竟鏍?*/
        .sidebar {
            width: 80px;
            min-width: 80px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            padding: 40px 0;
            transition: width 0.5s var(--fluid-ease) 0.5s, background 0.3s, border-color 0.3s;
            z-index: 50;
        }

        .sidebar:hover {
            width: 220px;
            transition-delay: 0s;
        }

        /* 棣栨鍔犺浇鏃朵笌 iframe 鐨?0.5s 娣″叆鍚屾鎾斁锛岄伩鍏嶄晶鏍?鐒婃"鍦ㄥ師鍦伴€犳垚瑙嗚鏂眰 */
        @keyframes sidebar-enter {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        html:not(.studio-route-booting) .sidebar {
            animation: sidebar-enter 0.5s var(--fluid-ease);
        }

        .logo-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--text);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 浠呬繚鐣?hover 鐪熸浼氱敤鍒扮殑灞炴€ц繃娓★紝閬垮厤 transition: all 鍥犻灞忓睘鎬цˉ榻愯鎰忓瑙﹀彂 */
            transition: transform 0.6s var(--fluid-ease) 0.5s, border-radius 0.6s var(--fluid-ease) 0.5s, border-color 0.3s;
        }

        .sidebar:hover .logo-ring {
            transform: rotate(90deg);
            border-radius: 50%;
            transition-delay: 0s;
        }

        /* 瀵艰埅椤?*/
        .nav-item {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 18px;
            cursor: pointer;
            /* 鍙 width 鍋氬甫寤惰繜鐨勮繃娓★紙渚ф爮鎮仠灞曞紑鏁堟灉锛夛紱background/color 涓嶅弬涓庤繃娓★紝閬垮厤 active 鍒囨崲鏃跺簳鑹?娴佸姩" */
            transition: width 0.3s var(--fluid-ease) 0.5s;
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
        }

        .sidebar:hover .nav-item {
            width: 190px;
            transition-delay: 0s;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        html.theme-dark .nav-item.active,
        body.theme-dark .nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-text {
            opacity: 0;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s 0.5s;
        }

        .sidebar:hover .nav-text {
            opacity: 1;
            transition-delay: 0.1s;
        }

        /* 涓昏垶鍙板尯 */
        .stage {
            flex: 1;
            background: var(--stage-bg);
            margin: 16px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--stage-border);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 宸︿笅瑙掔洃瑙嗗櫒 */
        .nano-monitor {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--monitor-bg);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--monitor-border);
            box-shadow: 0 4px 20px var(--monitor-shadow);
            font-family: monospace;
            transition: all 0.4s var(--fluid-ease);
        }

        .nano-monitor.is-busy {
            background: #000;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .nano-monitor.is-busy .stat-group {
            color: #fff;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(255, 255, 255, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

        .agent-drawer {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 120;
            width: min(420px, calc(100vw - 24px));
            height: 100%;
            background: rgba(255, 255, 255, 0.94);
            border-left: 1px solid var(--border);
            box-shadow: -24px 0 64px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(18px);
            transform: translateX(100%);
            transition: transform 0.24s var(--fluid-ease);
            display: flex;
            flex-direction: column;
        }

        html.theme-dark .agent-drawer,
        body.theme-dark .agent-drawer {
            background: rgba(15, 20, 29, 0.94);
            box-shadow: -24px 0 64px rgba(0, 0, 0, 0.28);
        }

        .agent-drawer.open {
            transform: translateX(0);
        }

        .agent-head {
            padding: 22px 22px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .agent-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .agent-sub {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .agent-close {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: transparent;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .agent-body {
            padding: 18px 22px 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: auto;
        }

        .agent-card {
            border: 1px solid var(--border);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.72);
            padding: 16px;
        }

        html.theme-dark .agent-card,
        body.theme-dark .agent-card {
            background: rgba(17, 23, 34, 0.72);
        }

        .agent-label {
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .agent-input {
            width: 100%;
            min-height: 110px;
            resize: vertical;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            padding: 14px 16px;
            font: inherit;
            outline: none;
        }

        html.theme-dark .agent-input,
        body.theme-dark .agent-input {
            background: rgba(15, 20, 29, 0.92);
        }

        .agent-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .agent-btn {
            height: 40px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }

        .agent-btn.primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .agent-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .agent-meta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .agent-plan-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
        }

        .agent-plan-summary {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.55;
        }

        .agent-list {
            margin: 12px 0 0;
            padding-left: 18px;
            color: var(--text);
            font-size: 12px;
            line-height: 1.65;
        }

        .agent-list li + li {
            margin-top: 6px;
        }

        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.06);
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        .agent-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #94a3b8;
        }

        .agent-empty {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .agent-preview-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .agent-preview-item {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.55);
        }

        html.theme-dark .agent-preview-item,
        body.theme-dark .agent-preview-item {
            background: rgba(15, 20, 29, 0.72);
        }

        .agent-preview-k {
            color: var(--muted);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .agent-preview-v {
            margin-top: 4px;
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
            line-height: 1.45;
        }

        .agent-note {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            font-size: 12px;
            line-height: 1.55;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.04);
            color: var(--text);
        }

        .agent-note.warning {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.26);
            color: #92400e;
        }

        .agent-note.error {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.24);
            color: #b91c1c;
        }

        html.theme-dark .agent-note.warning,
        body.theme-dark .agent-note.warning {
            color: #fdba74;
        }

        html.theme-dark .agent-note.error,
        body.theme-dark .agent-note.error {
            color: #fca5a5;
        }

        .agent-field-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .agent-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .agent-field span {
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .agent-select {
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            padding: 0 12px;
            font-size: 12px;
            outline: none;
        }

        html.theme-dark .agent-select,
        body.theme-dark .agent-select {
            background: rgba(15, 20, 29, 0.92);
        }

        .agent-timeline {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .agent-event {
            position: relative;
            padding-left: 18px;
            color: var(--text);
            font-size: 12px;
            line-height: 1.5;
        }

        .agent-event::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #94a3b8;
        }

        .agent-event.running::before { background: #3b82f6; }
        .agent-event.succeeded::before { background: #10b981; }
        .agent-event.failed::before { background: #ef4444; }
        .agent-event.cancelled::before { background: #f59e0b; }

        .agent-event-time {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 11px;
        }

        .side-actions {
            margin-top:auto;
            margin-bottom:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            width:100%;
        }

        .side-pill {
            width:44px;
            height:36px;
            border-radius:999px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* 鍙繃娓?hover/婵€娲讳細鏀圭殑灞炴€э紝閬垮厤 all 瑙﹀彂寤惰繜 */
            transition: width 0.3s var(--fluid-ease) 0.5s, gap 0.3s var(--fluid-ease) 0.5s, background-color 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
            overflow:hidden;
            gap:8px;
            position:relative;
        }

        .sidebar:hover .side-pill {
            width: 170px;
            transition-delay: 0s;
        }

        .side-pill:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .side-pill.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .side-pill svg { width: 16px; height: 16px; flex:0 0 auto; }
        .side-pill-text {
            opacity:0;
            max-width:0;
            font-size:12px;
            font-weight:800;
            letter-spacing:.02em;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.3s 0.5s, max-width 0.3s var(--fluid-ease) 0.5s;
        }
        .sidebar:hover .side-pill-text {
            opacity:1;
            max-width:120px;
            transition-delay:.15s;
        }
        /* 鎶樺彔鎬佸幓闄?gap锛岄伩鍏嶅浘鏍囪鎺ㄥ亸 */
        .side-pill { gap:0; }
        .sidebar:hover .side-pill { gap:8px; }
    </style>
</head>

<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo-ring mb-12">
                <div class="w-1.5 h-1.5 rounded-full transition-colors" id="logo-dot" style="background:var(--text)"></div>
            </div>

            <nav>
                <div class="nav-item active" onclick="switchUI(this, 'zimage')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.587-1.587a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span class="nav-text" data-i18n="nav.textToImage">鏂囩敓鍥?/span>
                </div>
                <div class="nav-item" onclick="switchUI(this, 'enhance')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span class="nav-text" data-i18n="nav.enhance">缁嗚妭澧炲己</span>
                </div>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);
        const ACTIVE_PAGE_KEY = 'studio_active_page';
        const DEFAULT_PAGE_ID = 'zimage';
        const PAGE_IDS = ['zimage','enhance','klein','angle','online','gpt-chat','canvas','library','api-settings','comfyui-settings'];
        let currentPageId = DEFAULT_PAGE_ID;
        let currentAgentTask = null;
        let agentContextOverride = null;
        let agentPollTimer = null;
        let agentProviders = [];
        const agentFab = document.getElementById('agentFab');
        const agentDrawer = document.getElementById('agentDrawer');
        const agentCloseBtn = document.getElementById('agentCloseBtn');
        const agentGoalInput = document.getElementById('agentGoalInput');
        const agentPlanBtn = document.getElementById('agentPlanBtn');
        const agentRunBtn = document.getElementById('agentRunBtn');
        const agentCancelBtn = document.getElementById('agentCancelBtn');
        const agentContextMeta = document.getElementById('agentContextMeta');
        const agentStatusText = document.getElementById('agentStatusText');
        const agentTaskMeta = document.getElementById('agentTaskMeta');
        const agentTaskEvents = document.getElementById('agentTaskEvents');
        const agentPlanResult = document.getElementById('agentPlanResult');
        const agentResult = document.getElementById('agentResult');
        const agentConfigCard = document.getElementById('agentConfigCard');
        const agentProviderSelect = document.getElementById('agentProviderSelect');
        const agentModelSelect = document.getElementById('agentModelSelect');
        const agentConfigHint = document.getElementById('agentConfigHint');

        function switchUI(el, id, options = {}) {
            if(!PAGE_IDS.includes(id)) id = DEFAULT_PAGE_ID;
            document.querySelectorAll('.nav-item,.side-pill').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const target = document.getElementById('frame-' + id);
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            if(!options.skipRemember) localStorage.setItem(ACTIVE_PAGE_KEY, id);
            currentPageId = id;
            agentContextOverride = null;
            updateAgentContextMeta();
            // sync theme to newly activated iframe
            syncThemeToFrame(target);
            syncLanguageToFrame(target);
            if (id === 'canvas' && target.src) {
                try { target.contentWindow?.postMessage({ type: 'canvas-focus' }, '*'); } catch(e) {}
            }
        }

        function restoreActivePage() {
            const id = PAGE_IDS.includes(localStorage.getItem(ACTIVE_PAGE_KEY)) ? localStorage.getItem(ACTIVE_PAGE_KEY) : DEFAULT_PAGE_ID;
            const trigger = document.querySelector(`[onclick*="'${id}'"],[onclick*='"${id}"']`);
            switchUI(trigger, id, { skipRemember:true });
            document.documentElement.classList.remove('studio-route-booting');
        }
        document.addEventListener('DOMContentLoaded', restoreActivePage, { once:true });

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const logoDot = document.getElementById('logo-dot');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor.classList.add('is-busy');
                    queueVal.innerText = `${pos}/${total}`;
                    logoDot.style.backgroundColor = '#3b82f6';
                } else {
                    monitor.classList.remove('is-busy');
                    queueVal.innerText = total > 0 ? total : '0';
                    logoDot.style.backgroundColor = 'var(--text)';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    document.getElementById('online-val').innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'canvas_updated') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 澶滈棿妯″紡 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'light';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        function toggleLanguage() {
            if(!window.StudioI18n) return;
            window.StudioI18n.toggle();
            document.querySelectorAll('iframe').forEach(frame => syncLanguageToFrame(frame));
        }

        function syncLanguageToFrame(frame) {
            if(!window.StudioI18n) return;
            try {
                frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
            } catch(e) {}
        }

        function broadcastLanguage() {
            document.querySelectorAll('iframe').forEach(frame => {
                try {
                    frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
                } catch(e) {}
            });
        }

        function setAgentDrawerOpen(open) {
            if(open) agentDrawer.classList.add('open');
            else agentDrawer.classList.remove('open');
            agentDrawer.setAttribute('aria-hidden', open ? 'false' : 'true');
            agentFab.classList.toggle('active', Boolean(open));
        }

        function humanPageLabel(pageId) {
            const map = {
                'library': '资源库',
                'canvas': '智能画布/画布',
                'home': '首页工作台',
                'zimage': '首页工作台',
                'enhance': '增强页',
                'klein': '编辑页',
                'angle': '角度页',
                'online': '在线生图',
                'gpt-chat': 'GPT 对话',
                'api-settings': 'API 设置',
                'comfyui-settings': 'ComfyUI 设置'
            };
            return map[pageId] || '当前页面';
        }

        function stopAgentPolling() {
            if (agentPollTimer) {
                clearInterval(agentPollTimer);
                agentPollTimer = null;
            }
        }

        function formatAgentTime(value) {
            if (!value) return '';
            const date = new Date(Number(value));
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }

        function agentTaskNeedsModelConfig(task = currentAgentTask) {
            const toolIds = task?.plan?.tool_ids || [];
            return Array.isArray(toolIds) && toolIds.includes('tag_library_images');
        }

        function findAgentProvider(providerId) {
            return agentProviders.find(item => item.id === providerId) || null;
        }

        function providerModelOptions(providerId) {
            const provider = findAgentProvider(providerId);
            return Array.isArray(provider?.chat_models) ? provider.chat_models : [];
        }

        function renderAgentModelOptions(preferredModel = '') {
            const providerId = agentProviderSelect.value;
            const models = providerModelOptions(providerId);
            agentModelSelect.innerHTML = '';
            if (models.length) {
                models.forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model;
                    opt.textContent = model;
                    agentModelSelect.appendChild(opt);
                });
                agentModelSelect.value = models.includes(preferredModel) ? preferredModel : models[0];
            } else {
                agentModelSelect.innerHTML = '<option value="">-- 请先配置可用模型 --</option>';
            }
        }

        async function ensureAgentProvidersLoaded() {
            if (agentProviders.length) return;
            try {
                const res = await fetch('/api/providers');
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '加载 Provider 失败');
                agentProviders = (data.providers || []).filter(item => item.enabled);
            } catch (err) {
                agentProviders = [];
            }
        }

        async function syncAgentConfigCard(task = currentAgentTask) {
            if (!agentTaskNeedsModelConfig(task)) {
                agentConfigCard.style.display = 'none';
                return;
            }
            agentConfigCard.style.display = '';
            await ensureAgentProvidersLoaded();
            const ctx = buildAgentContext();
            const currentProvider = ctx.provider || '';
            const currentModel = ctx.model || '';
            agentProviderSelect.innerHTML = '<option value="">默认</option>';
            agentProviders.forEach(provider => {
                const opt = document.createElement('option');
                opt.value = provider.id;
                opt.textContent = provider.name || provider.id;
                agentProviderSelect.appendChild(opt);
            });
            agentProviderSelect.value = currentProvider;
            renderAgentModelOptions(currentModel);
            if (currentModel) {
                const models = providerModelOptions(agentProviderSelect.value);
                if (models.includes(currentModel)) agentModelSelect.value = currentModel;
            }
            agentConfigHint.textContent = agentModelSelect.value
                ? `当前将使用 ${agentProviderSelect.value || '默认'} / ${agentModelSelect.value} 进行批量标注。`
                : '批量标注需要显式选择可用的聊天模型。';
            updateAgentRunAvailability();
        }

        function agentContextOverridesFromControls() {
            if (!agentTaskNeedsModelConfig()) return {};
            return {
                provider: agentProviderSelect.value || '',
                model: agentModelSelect.value || ''
            };
        }

        function buildAgentContext() {
            const base = {
                active_page: currentPageId,
                active_page_label: humanPageLabel(currentPageId)
            };
            const merged = {
                ...base,
                ...(agentContextOverride || {}),
                ...agentContextOverridesFromControls(),
                active_page: (agentContextOverride || {}).active_page || base.active_page,
                active_page_label: (agentContextOverride || {}).active_page_label || base.active_page_label
            };
            return merged;
        }

        function updateAgentContextMeta() {
            const ctx = buildAgentContext();
            const parts = [`当前入口：${ctx.active_page_label}`];
            if (ctx.source_name) parts.push(`来源：${ctx.source_name}`);
            if (ctx.query) parts.push(`搜索词：${ctx.query}`);
            if (ctx.category) parts.push(`分类：${ctx.category}`);
            if (ctx.provider) parts.push(`Provider：${ctx.provider}`);
            if (ctx.model) parts.push(`模型：${ctx.model}`);
            if (Number(ctx.visible_count || 0) > 0) parts.push(`当前可见：${ctx.visible_count} 张`);
            if (Number(ctx.selected_count || 0) > 0) parts.push(`当前选中：${ctx.selected_count} 张`);
            agentContextMeta.textContent = `${parts.join('，')}。`;
        }

        function setAgentStatus(status, message) {
            const labels = {
                idle: '未开始',
                loading: '生成中',
                planned: '已生成计划',
                running: '执行中',
                succeeded: '执行完成',
                failed: '执行失败',
                cancelled: '已取消',
                error: '出错了'
            };
            agentStatusText.textContent = labels[status] || status;
            if(message) agentTaskMeta.textContent = message;
        }

        function renderAgentEvents(task) {
            const events = Array.isArray(task?.events) ? task.events : [];
            if (!events.length) {
                agentTaskEvents.innerHTML = '';
                return;
            }
            agentTaskEvents.innerHTML = events.map(event => `
                <div class="agent-event ${escapeHtml(event.type || '')}">
                    <div>${escapeHtml(event.message || '')}</div>
                    <span class="agent-event-time">${escapeHtml(formatAgentTime(event.at))}${event.progress_total ? ` · ${escapeHtml(event.progress_current || 0)}/${escapeHtml(event.progress_total)}` : ''}</span>
                </div>
            `).join('');
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function updateAgentRunAvailability() {
            if (!currentAgentTask?.id) {
                agentRunBtn.disabled = true;
                agentCancelBtn.disabled = true;
                return;
            }
            const status = currentAgentTask.status || 'planned';
            if (status === 'running') {
                agentRunBtn.disabled = true;
                agentCancelBtn.disabled = false;
                return;
            }
            if (['succeeded', 'failed', 'cancelled'].includes(status)) {
                agentRunBtn.disabled = true;
                agentCancelBtn.disabled = true;
                return;
            }
            const plan = resolveAgentPlanForDisplay(currentAgentTask);
            const blockers = Array.isArray(plan?.blockers) ? plan.blockers : [];
            const canRun = Boolean(plan && plan.can_run !== false && blockers.length === 0);
            agentRunBtn.disabled = !canRun;
            agentCancelBtn.disabled = true;
        }

        function resolveAgentPlanForDisplay(task) {
            const rawPlan = task?.plan;
            if (!rawPlan) return null;
            const plan = {
                ...rawPlan,
                preview: { ...(rawPlan.preview || {}) },
                blockers: Array.isArray(rawPlan.blockers) ? [...rawPlan.blockers] : []
            };
            if (agentTaskNeedsModelConfig(task)) {
                if (agentProviderSelect.value) plan.preview.provider = agentProviderSelect.value;
                if (agentModelSelect.value) {
                    plan.preview.model = agentModelSelect.value;
                    plan.blockers = plan.blockers.filter(item => !String(item).includes('Provider 和模型'));
                }
                plan.can_run = Boolean((plan.preview.effective_count || 0) > 0 && agentModelSelect.value);
            }
            return plan;
        }

        function renderAgentPlan(task) {
            const plan = resolveAgentPlanForDisplay(task);
            if(!plan) {
                agentPlanResult.innerHTML = '<div class="agent-empty">还没有可展示的计划。</div>';
                return;
            }
            const contextLines = Array.isArray(plan.context_summary) ? plan.context_summary : [];
            const steps = Array.isArray(plan.steps) ? plan.steps : [];
            const preview = plan.preview || {};
            const blockers = Array.isArray(plan.blockers) ? plan.blockers : [];
            const warnings = Array.isArray(preview.warnings) ? preview.warnings : [];
            agentPlanResult.innerHTML = `
                <div class="agent-plan-title">${escapeHtml(plan.title || '任务计划')}</div>
                <div class="agent-plan-summary">${escapeHtml(plan.summary || '')}</div>
                <ul class="agent-list">
                    ${contextLines.map(line => `<li>${escapeHtml(line)}</li>`).join('')}
                </ul>
                <div class="agent-preview-grid">
                    <div class="agent-preview-item">
                        <div class="agent-preview-k">目标来源</div>
                        <div class="agent-preview-v">${escapeHtml(preview.target_source_label || '当前上下文')}</div>
                    </div>
                    <div class="agent-preview-item">
                        <div class="agent-preview-k">命中 / 实际处理</div>
                        <div class="agent-preview-v">${escapeHtml(preview.matched_total || 0)} / ${escapeHtml(preview.effective_count || 0)}</div>
                    </div>
                    <div class="agent-preview-item">
                        <div class="agent-preview-k">写入目标</div>
                        <div class="agent-preview-v">${escapeHtml(preview.write_target_label || '无写入')}</div>
                    </div>
                    <div class="agent-preview-item">
                        <div class="agent-preview-k">执行上限</div>
                        <div class="agent-preview-v">${escapeHtml(preview.limit || 0)}${preview.truncated ? '（已截断）' : ''}</div>
                    </div>
                </div>
                ${warnings.map(item => `<div class="agent-note warning">${escapeHtml(item)}</div>`).join('')}
                ${blockers.map(item => `<div class="agent-note error">${escapeHtml(item)}</div>`).join('')}
                <div class="agent-plan-summary" style="margin-top:12px;">目标产出：${escapeHtml(plan.output_target || '未定义')}</div>
                <ul class="agent-list">
                    ${steps.map((step, index) => `<li>${index + 1}. ${escapeHtml(step.title || '')}${step.writes ? '（需确认）' : ''}</li>`).join('')}
                </ul>
                <div class="agent-note">${blockers.length ? '执行前还需要先解决上面的阻塞项。' : '确认无误后，再执行当前计划。'}</div>
            `;
        }

        function renderAgentResult(task) {
            const result = task?.result;
            if(!result) {
                agentResult.innerHTML = '<div class="agent-empty">执行完成后，这里会展示回跳入口。</div>';
                return;
            }
            if(result.error) {
                agentResult.innerHTML = `<div class="agent-empty">${escapeHtml(result.error)}</div>`;
                return;
            }
            if(result.kind === 'smart_canvas_created') {
                agentResult.innerHTML = `
                    <div class="agent-plan-title">${escapeHtml(result.canvas_title || '智能画布草稿')}</div>
                    <div class="agent-plan-summary">已插入 ${escapeHtml(result.inserted_image_count || 0)} 张图片，命中总数 ${escapeHtml(result.matched_total || 0)}${result.truncated ? '，已按上限截断。' : '。'}</div>
                    <div class="agent-actions" style="margin-top:12px;">
                        <button class="agent-btn primary" type="button" id="agentOpenCanvasBtn">打开智能画布</button>
                    </div>
                `;
                const openBtn = document.getElementById('agentOpenCanvasBtn');
                openBtn?.addEventListener('click', () => {
                    if(result.open_url) window.location.href = result.open_url;
                });
                return;
            }
            if(result.kind === 'library_imported') {
                agentResult.innerHTML = `
                    <div class="agent-plan-title">资源库回存完成</div>
                    <div class="agent-plan-summary">已导入 ${escapeHtml(result.count || 0)} 张图片${Array.isArray(result.skipped) && result.skipped.length ? `，跳过 ${escapeHtml(result.skipped.length)}` : ''}。</div>
                    <div class="agent-plan-summary">来源画布：${escapeHtml(result.canvas_title || result.canvas_id || '智能画布')}</div>
                    <div class="agent-actions" style="margin-top:12px;">
                        <button class="agent-btn primary" type="button" id="agentOpenLibraryBtn">打开资源库</button>
                    </div>
                `;
                const openBtn = document.getElementById('agentOpenLibraryBtn');
                openBtn?.addEventListener('click', () => {
                    if(result.open_url) window.location.href = result.open_url;
                });
                return;
            }
            if(result.kind === 'library_tagged') {
                agentResult.innerHTML = `
                    <div class="agent-plan-title">批量标注完成</div>
                    <div class="agent-plan-summary">已处理 ${escapeHtml(result.count || 0)} 张资源库图片，成功 ${escapeHtml(result.success_count || 0)} 张，失败 ${escapeHtml(result.failed_count || 0)} 张。</div>
                    <div class="agent-plan-summary">模型：${escapeHtml(result.provider || '默认')} / ${escapeHtml(result.model || '未设置')}</div>
                    <div class="agent-actions" style="margin-top:12px;">
                        <button class="agent-btn primary" type="button" id="agentOpenLibraryAfterTagBtn">打开资源库</button>
                    </div>
                `;
                const openBtn = document.getElementById('agentOpenLibraryAfterTagBtn');
                openBtn?.addEventListener('click', () => {
                    if(result.open_url) window.location.href = result.open_url;
                });
                return;
            }
            agentResult.innerHTML = `<div class="agent-empty">${escapeHtml(JSON.stringify(result))}</div>`;
        }

        async function createAgentPlan() {
            const goal = agentGoalInput.value.trim();
            stopAgentPolling();
            agentPlanBtn.disabled = true;
            agentRunBtn.disabled = true;
            agentCancelBtn.disabled = true;
            renderAgentResult(null);
            renderAgentEvents(null);
            setAgentStatus('loading', '正在生成计划...');
            try {
                const res = await fetch('/api/agent/plan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        goal,
                        page: currentPageId,
                        context: buildAgentContext()
                    })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail || '生成计划失败');
                currentAgentTask = data;
                await syncAgentConfigCard(data);
                updateAgentContextMeta();
                renderAgentPlan(data);
                renderAgentResult(data);
                renderAgentEvents(data);
                setAgentStatus('planned', `任务 ID：${data.id}，当前状态：${data.status}`);
                updateAgentRunAvailability();
            } catch (err) {
                renderAgentPlan(null);
                renderAgentResult(null);
                renderAgentEvents(null);
                setAgentStatus('error', err.message || '生成计划失败');
            } finally {
                agentPlanBtn.disabled = false;
            }
        }

        async function pollAgentTask(taskId) {
            if (!taskId) return;
            try {
                const res = await fetch(`/api/agent/tasks/${encodeURIComponent(taskId)}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '读取任务状态失败');
                currentAgentTask = data;
                renderAgentPlan(data);
                renderAgentResult(data);
                renderAgentEvents(data);
                const lastEvent = Array.isArray(data.events) && data.events.length ? data.events[data.events.length - 1] : null;
                const message = data.current_step?.message || lastEvent?.message || `任务 ${data.id} 状态：${data.status}`;
                setAgentStatus(data.status || 'running', message);
                updateAgentRunAvailability();
                if (['succeeded', 'failed', 'cancelled'].includes(data.status)) {
                    stopAgentPolling();
                    agentPlanBtn.disabled = false;
                    agentCancelBtn.disabled = true;
                }
            } catch (err) {
                stopAgentPolling();
                setAgentStatus('error', err.message || '读取任务状态失败');
                agentPlanBtn.disabled = false;
                agentCancelBtn.disabled = true;
            }
        }

        function startAgentPolling(taskId) {
            stopAgentPolling();
            pollAgentTask(taskId);
            agentPollTimer = setInterval(() => pollAgentTask(taskId), 1000);
        }

        async function runAgentTask() {
            if(!currentAgentTask?.id) return;
            agentPlanBtn.disabled = true;
            agentRunBtn.disabled = true;
            agentCancelBtn.disabled = false;
            setAgentStatus('running', `任务 ${currentAgentTask.id} 执行中...`);
            try {
                const res = await fetch('/api/agent/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        task_id: currentAgentTask.id,
                        context_overrides: agentContextOverridesFromControls()
                    })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail || '执行失败');
                currentAgentTask = data;
                updateAgentContextMeta();
                renderAgentPlan(data);
                renderAgentResult(data);
                renderAgentEvents(data);
                setAgentStatus('running', `任务 ${data.id} 已开始执行`);
                startAgentPolling(data.id);
            } catch (err) {
                setAgentStatus('failed', err.message || '执行失败');
                renderAgentResult({ result: { error: err.message || '执行失败' } });
                agentCancelBtn.disabled = true;
            } finally {
                updateAgentRunAvailability();
            }
        }

        async function cancelAgentTask() {
            if(!currentAgentTask?.id) return;
            agentRunBtn.disabled = true;
            agentCancelBtn.disabled = true;
            try {
                const res = await fetch(`/api/agent/cancel/${encodeURIComponent(currentAgentTask.id)}`, {
                    method: 'POST'
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail || '取消任务失败');
                currentAgentTask = data;
                stopAgentPolling();
                renderAgentEvents(data);
                setAgentStatus('cancelled', `任务 ${data.id} 已取消`);
            } catch (err) {
                setAgentStatus('error', err.message || '取消任务失败');
                agentCancelBtn.disabled = false;
            } finally {
                agentPlanBtn.disabled = false;
            }
        }

        async function requestAgentPlanFromContext(payload = {}) {
            const nextPage = payload.page;
            if (nextPage && PAGE_IDS.includes(nextPage)) currentPageId = nextPage;
            agentContextOverride = payload.context && typeof payload.context === 'object'
                ? { ...payload.context }
                : null;
            if (typeof payload.goal === 'string' && payload.goal.trim()) {
                agentGoalInput.value = payload.goal.trim();
            }
            updateAgentContextMeta();
            await syncAgentConfigCard();
            setAgentDrawerOpen(true);
            if (payload.autoPlan !== false) {
                await createAgentPlan();
            }
        }

        window.addEventListener('message', (event) => {
            const data = event?.data;
            if (!data || typeof data !== 'object') return;
            if (data.type === 'studio-agent-request') {
                requestAgentPlanFromContext(data);
            }
        });

        // listen for theme changes triggered by theme.js
        window.addEventListener('studio-theme-change', (e) => {
            updateThemeIcon(e.detail.theme);
        });

        // init icon state on load
        window.addEventListener('DOMContentLoaded', () => {
            const theme = window.StudioTheme ? window.StudioTheme.get() : 'light';
            updateThemeIcon(theme);
            if(window.StudioI18n) window.StudioI18n.apply();
            broadcastLanguage();
            updateAgentContextMeta();
            setAgentStatus('idle', '还没有生成计划。');
            renderAgentEvents(null);
        });

        agentFab.addEventListener('click', () => setAgentDrawerOpen(true));
        agentCloseBtn.addEventListener('click', () => setAgentDrawerOpen(false));
        agentPlanBtn.addEventListener('click', createAgentPlan);
        agentRunBtn.addEventListener('click', runAgentTask);
        agentCancelBtn.addEventListener('click', cancelAgentTask);
        agentProviderSelect.addEventListener('change', () => {
            renderAgentModelOptions('');
            agentConfigHint.textContent = agentModelSelect.value
                ? `当前将使用 ${agentProviderSelect.value || '默认'} / ${agentModelSelect.value} 进行批量标注。`
                : '批量标注需要显式选择可用的聊天模型。';
            updateAgentContextMeta();
            renderAgentPlan(currentAgentTask);
            updateAgentRunAvailability();
        });
        agentModelSelect.addEventListener('change', () => {
            agentConfigHint.textContent = agentModelSelect.value
                ? `当前将使用 ${agentProviderSelect.value || '默认'} / ${agentModelSelect.value} 进行批量标注。`
                : '批量标注需要显式选择可用的聊天模型。';
            updateAgentContextMeta();
            renderAgentPlan(currentAgentTask);
            updateAgentRunAvailability();
        });

        // sync theme when iframe loads
        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => {
                syncThemeToFrame(f);
                syncLanguageToFrame(f);
            });
        });
    </script>
</body>

</html>
